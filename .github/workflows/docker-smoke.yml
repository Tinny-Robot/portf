name: Docker smoke test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t portfolio-smoke .
      - name: Run container
        run: docker run -d --rm -p 8080:8080 --name portfolio-smoke portfolio-smoke
      - name: Smoke test
        run: |
          sleep 5
          curl -fsS http://127.0.0.1:8080/api/health
          curl -fsS http://127.0.0.1:8080/ >/dev/null
          curl -fsS http://127.0.0.1:8080/reviews.html >/dev/null
          curl -fsS http://127.0.0.1:8080/sitemap.xml >/dev/null
      - name: Stop container
        if: always()
        run: docker rm -f portfolio-smoke || true
